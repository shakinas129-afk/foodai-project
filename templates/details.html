<!DOCTYPE html>
<html>

<head>

    <title>Restaurant Details</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#020617;
            color:white;
            padding:40px;
        }

        .box{
            max-width:1000px;
            margin:auto;
            background:#111827;
            border-radius:24px;
            overflow:hidden;
        }

        img{
            width:100%;
            height:500px;
            object-fit:cover;
        }

        .content{
            padding:35px;
        }

        h1{
            margin-bottom:25px;
            font-size:42px;
        }

        p{
            margin-bottom:16px;
            color:#cbd5e1;
            line-height:30px;
            font-size:18px;
        }

        a{
            display:inline-block;
            margin-top:20px;
            background:#38bdf8;
            color:white;
            text-decoration:none;
            padding:14px 24px;
            border-radius:14px;
        }

    </style>

</head>

<body>

    <div class="box">

        <img src="{{ restaurant.image }}">

        <div class="content">

            <h1>
                {{ restaurant.name }}
            </h1>

            <p>
                Food: {{ restaurant.food }}
            </p>

            <p>
                Cuisine: {{ restaurant.cuisine }}
            </p>

            <p>
                Location: {{ restaurant.location }}
            </p>

            <p>
                Price: ₹ {{ restaurant.price }}
            </p>

            <p>
                Rating: ⭐ {{ restaurant.rating }}
            </p>

            <p>
                {{ restaurant.description }}
            </p>

            <a href="/">
                Back Home
            </a>

        </div>

    </div>

</body>

</html>
