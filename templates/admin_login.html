<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.8)),
            url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1600&auto=format&fit=crop');

            background-size:cover;
            background-position:center;

            padding:20px;
        }

        .login-box{
            width:100%;
            max-width:420px;

            background:rgba(17,24,39,0.88);

            backdrop-filter:blur(14px);

            border:1px solid rgba(255,255,255,0.08);

            border-radius:24px;

            padding:40px;

            box-shadow:0 0 40px rgba(0,0,0,0.5);
        }

        .login-box h1{
            text-align:center;
            color:#38bdf8;
            font-size:38px;
            margin-bottom:30px;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box input{
            width:100%;
            padding:16px;
            border:none;
            outline:none;
            border-radius:14px;
            background:#1e293b;
            color:white;
            font-size:16px;
        }

        .input-box input::placeholder{
            color:#94a3b8;
        }

        button{
            width:100%;
            padding:16px;
            border:none;
            border-radius:14px;
            background:#38bdf8;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0ea5e9;
            transform:translateY(-3px);
        }

        .bottom-text{
            margin-top:20px;
            text-align:center;
            color:#cbd5e1;
        }

        .bottom-text a{
            color:#38bdf8;
            text-decoration:none;
        }

        @media(max-width:500px){

            .login-box{
                padding:30px 25px;
            }

            .login-box h1{
                font-size:30px;
            }

        }

    </style>

</head>

<body>

    <div class="login-box">

        <h1>
            Admin Login 🔐
        </h1>

        <form method="POST">

            <div class="input-box">

                <input
                    type="text"
                    name="username"
                    placeholder="Admin Username"
                    required
                >

            </div>

            <div class="input-box">

                <input
                    type="password"
                    name="password"
                    placeholder="Admin Password"
                    required
                >

            </div>

            <button>
                Login
            </button>

        </form>

        <div class="bottom-text">

            FoodAI Admin Access 🚀

        </div>

    </div>

</body>

</html>
