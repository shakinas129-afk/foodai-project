<!DOCTYPE html>
<html>

<head>

    <title>Update Restaurant</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#020617;
            padding:40px;
            color:white;
        }

        .form-box{
            max-width:650px;
            margin:auto;
            background:#111827;
            padding:35px;
            border-radius:24px;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#38bdf8;
        }

        input,
        textarea{
            width:100%;
            padding:16px;
            margin-bottom:20px;
            border:none;
            border-radius:14px;
            background:#1e293b;
            color:white;
        }

        textarea{
            height:140px;
            resize:none;
        }

        button{
            width:100%;
            padding:16px;
            border:none;
            border-radius:14px;
            background:#38bdf8;
            color:white;
            font-size:18px;
        }

    </style>

</head>

<body>

    <div class="form-box">

        <h1>
            Update Restaurant ✏️
        </h1>

        <form method="POST">

            <input type="text" name="name" value="{{ restaurant.name }}">

            <input type="text" name="food" value="{{ restaurant.food }}">

            <input type="text" name="cuisine" value="{{ restaurant.cuisine }}">

            <input type="text" name="location" value="{{ restaurant.location }}">

            <input type="number" name="price" value="{{ restaurant.price }}">

            <input type="number" step="0.1" name="rating" value="{{ restaurant.rating }}">

            <textarea name="description">{{ restaurant.description }}</textarea>

            <button>
                Update Restaurant
            </button>

        </form>

    </div>

</body>

</html>
