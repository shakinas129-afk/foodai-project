<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Panel</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            background:
            linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.8)),
            url('https://images.unsplash.com/photo-1498654896293-37aacf113fd9?q=80&w=1600&auto=format&fit=crop');

            background-size:cover;
            background-position:center;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:30px;
        }

        .form-box{
            width:100%;
            max-width:650px;

            background:rgba(17,24,39,0.9);

            backdrop-filter:blur(14px);

            border-radius:24px;

            padding:40px;

            border:1px solid rgba(255,255,255,0.08);

            box-shadow:0 0 40px rgba(0,0,0,0.4);
        }

        .form-box h1{
            text-align:center;
            color:#38bdf8;
            margin-bottom:30px;
            font-size:42px;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box input,
        .input-box textarea{
            width:100%;
            padding:16px;
            border:none;
            outline:none;
            border-radius:14px;
            background:#1e293b;
            color:white;
            font-size:16px;
        }

        .input-box input::placeholder,
        .input-box textarea::placeholder{
            color:#94a3b8;
        }

        textarea{
            resize:none;
            height:130px;
        }

        button{
            width:100%;
            padding:16px;
            border:none;
            border-radius:14px;
            background:#38bdf8;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0ea5e9;
            transform:translateY(-3px);
        }

        @media(max-width:600px){

            .form-box{
                padding:30px 22px;
            }

            .form-box h1{
                font-size:32px;
            }

        }

    </style>

</head>

<body>

    <div class="form-box">

        <h1>
            Admin Panel 🚀
        </h1>

        <form method="POST" enctype="multipart/form-data">

            <div class="input-box">

                <input
                    type="text"
                    name="name"
                    placeholder="Restaurant Name"
                    required
                >

            </div>

            <div class="input-box">

                <input
                    type="text"
                    name="food"
                    placeholder="Food Type"
                    required
                >

            </div>

            <div class="input-box">

                <input
                    type="text"
                    name="cuisine"
                    placeholder="Cuisine"
                    required
                >

            </div>

            <div class="input-box">

                <input
                    type="text"
                    name="location"
                    placeholder="Location"
                    required
                >

            </div>

            <div class="input-box">

                <input
                    type="number"
                    name="price"
                    placeholder="Price"
                    required
                >

            </div>

            <div class="input-box">

                <input
                    type="number"
                    step="0.1"
                    name="rating"
                    placeholder="Rating"
                    required
                >

            </div>

            <div class="input-box">

                <textarea
                    name="description"
                    placeholder="Restaurant Description"
                    required
                ></textarea>

            </div>

            <div class="input-box">

                <input
                    type="file"
                    name="image"
                    required
                >

            </div>

            <button>
                Add Restaurant
            </button>

        </form>

    </div>

</body>

</html>
